<!doctype html>
<html lang="hu">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="%BASE_URL%favicon.ico" />
    <link rel="manifest" href="%BASE_URL%manifest.json" />
    <link rel="apple-touch-icon" href="%BASE_URL%app-images/ios/180.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="%BASE_URL%app-images/ios/32.png" />
    <title>NoMa Karbantartás - Címkéző</title>
    <meta name="description" content="NoMa karbantartási címkéző alkalmazás" />
    <meta name="theme-color" content="#02322D" />
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function () {
        var retryKey = "noma:boot-retry-count";
        var maxRetries = 3;
        var overlay = null;

        function ensureOverlay() {
          if (overlay) return overlay;
          overlay = document.createElement("div");
          overlay.style.position = "fixed";
          overlay.style.inset = "0";
          overlay.style.zIndex = "2147483647";
          overlay.style.display = "grid";
          overlay.style.placeItems = "center";
          overlay.style.background = "#ffffff";
          overlay.style.color = "#02322d";
          overlay.style.padding = "24px";
          overlay.style.textAlign = "center";
          overlay.style.fontFamily = "system-ui, sans-serif";
          overlay.style.lineHeight = "1.5";
          overlay.innerHTML =
            '<div><div id="noma-boot-title" style="font-size:20px;font-weight:700;margin-bottom:8px">Az alkalmazás betöltése folyamatban...</div><div id="noma-boot-detail" style="font-size:14px;opacity:.78"></div></div>';
          document.body.appendChild(overlay);
          return overlay;
        }

        function setOverlay(title, detail) {
          var node = ensureOverlay();
          var titleNode = node.querySelector("#noma-boot-title");
          var detailNode = node.querySelector("#noma-boot-detail");
          if (titleNode) titleNode.textContent = title;
          if (detailNode) detailNode.textContent = detail;
        }

        function matchesRecoveryError(message) {
          return /Failed to fetch dynamically imported module|Importing a module script failed|Loading chunk|ChunkLoadError/i.test(
            String(message || ""),
          );
        }

        function scheduleRetry(detail) {
          var attempt = Number(sessionStorage.getItem(retryKey) || "0");
          if (attempt >= maxRetries) {
            sessionStorage.removeItem(retryKey);
            setOverlay(
              "Nem sikerült betölteni az alkalmazást.",
              "Frissítse újra az oldalt, miután a deployment befejeződött.",
            );
            return;
          }

          sessionStorage.setItem(retryKey, String(attempt + 1));
          setOverlay("Az új verzió betöltése folyamatban...", detail);
          window.setTimeout(function () {
            window.location.reload();
          }, 1000 + attempt * 1500);
        }

        window.addEventListener(
          "vite:preloadError",
          function (event) {
            event.preventDefault();
            scheduleRetry("Újrapróbálkozás közben frissítjük a betöltést.");
          },
          true,
        );

        window.addEventListener(
          "error",
          function (event) {
            var target = event.target;
            var isResourceError =
              target && (target.tagName === "SCRIPT" || target.tagName === "LINK");
            if (isResourceError || matchesRecoveryError(event.message)) {
              scheduleRetry("A legutóbbi deploy közben a szükséges fájlok még nem voltak elérhetők.");
            }
          },
          true,
        );

        window.addEventListener("unhandledrejection", function (event) {
          var reason = event.reason;
          var message =
            typeof reason === "string"
              ? reason
              : reason && typeof reason === "object" && "message" in reason
                ? reason.message
                : "";
          if (matchesRecoveryError(message)) {
            scheduleRetry("A legutóbbi deploy még nem volt teljesen kész.");
          }
        });
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
